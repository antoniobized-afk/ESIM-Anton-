# Явная конфигурация Nixpacks для frontend (Next.js mini-app).
# Перебивает корневой /nixpacks.toml (который для bot/backend и использует pnpm),
# чтобы Railway не путался: client всегда собираем через npm + legacy-peer-deps.
#
# Раньше Railway запускал и pnpm install (из корня), и npm install (из railway.json) —
# в новом Nixpacks-образе ubuntu-1745885867 (Apr 29) такой mix начал падать на build.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --include=dev --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
