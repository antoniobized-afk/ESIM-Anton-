server {
    listen 80;
    listen [::]:80;
    server_name payments.mojomobile.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name payments.mojomobile.ru;

    ssl_certificate /etc/letsencrypt/live/payments.mojomobile.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/payments.mojomobile.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 1m;
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    set $payments_backend_host payments-backend.mojomobile.ru;

    access_log /var/log/nginx/payments.mojomobile.ru.access.log;
    error_log /var/log/nginx/payments.mojomobile.ru.error.log warn;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /api/payments/cloudpayments/check {
        include /etc/nginx/snippets/cloudpayments-callback-proxy.conf;
    }

    location = /api/payments/cloudpayments/pay {
        include /etc/nginx/snippets/cloudpayments-callback-proxy.conf;
    }

    location = /api/payments/cloudpayments/fail {
        include /etc/nginx/snippets/cloudpayments-callback-proxy.conf;
    }

    location / {
        return 404;
    }
}
